{% extends "base.html" %}
{% block body %}

<h2 class="text-center mt-3">RESULT</h2>
<div class="container my-3 d-flex align-itmes-center justify-content-center text-dark gap-3 border border-dark py-3 w-50 rounded">
  <h3>NAME : {{student.student_name}}</h3>
  <h3>|</h3>
  <h3>STD ID : {{student.student_id}}</h3>
</div>
<hr>

<div class="card mx-4 my-4 border border-dark d-flex mx-auto" style="width: 14rem;">
  <ul class="list-group list-group-flush">
    <li class="list-group-item fs-5">RANK : {{student.rank}}</li>
    <li class="list-group-item fs-5">TOTAL : {{total.total_marks}}</li>
  </ul>
</div>

<table class="w-75 mx-auto table table-striped table-bordered">
    <tbody>
      {% for q in queryset %}
    <tr>
      <th scope="row">{{forloop.counter}}</th>
      <td>{{q.subject.subject}}</td>
      <td>{{q.marks}}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock body %}
